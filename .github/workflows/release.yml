name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore YASN.sln

      - name: Publish win-x64
        run: dotnet publish src/YASN.App/YASN.App.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath YASN-win-x64.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: YASN-win-x64.zip